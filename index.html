<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invite Router</title>
</head>

<body>
    <script>
        const params = new URLSearchParams(window.location.search);
        const target = params.get("v") === "2" ? "index-2.html" : "index-1.html";

        // Keep query string so downstream pages can still read params if needed.
        window.location.replace(`${target}${window.location.search}`);
    </script>
</body>

</html>
